<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Register</title>
        <link rel="shortcut icon" href="images/shopping-bag.png" type="image/x-icon">
        <link rel="stylesheet" href="css/bootstrap.min.css">
        <link rel="stylesheet" href="css/all.min.css">
        <link rel="stylesheet" href="css/style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <section class="box w-75 m-auto rounded-3">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-md-6">
                        <div class="image-box">
                            <img src="images/shopping-image.png" class="img-fluid w-100" alt="shopping-image">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-box p-2 text-center text-capitalize  mt-3">
                            <h2>Create Your Account</h2>
                            <p class="mb-4">Join VOUGE today and discover the latest trends.</p>
                            <div class="mb-3">
                                <input type="text" class="form-control" id="inputName" placeholder="Your Name">
                            </div>
                            <div class="mb-3">
                                <input type="email" class="form-control" id="inputEmail" placeholder="Email Address">
                            </div>
                            <div class="mb-3">
                                <input type="password" class="form-control" id="inputPassword" placeholder="Password">
                            </div>
                            <div class="mb-3">
                                <input type="password" class="form-control" id="inputConfirmPassword" placeholder="Confirm Password">
                            </div>
                            <p class="d-none text-danger" id="massage"></p>
                            <button class="btn" onclick="register()">Create Account</button>
                            <p class="mt-3">Already have an account? <a href="login.html">login</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <script src="js/bootstrap.bundle.min.js"></script>
        <script src="js/script.js"></script>
    </body>
</html>
